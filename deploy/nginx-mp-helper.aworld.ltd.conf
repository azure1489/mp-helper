# mp-helper.aworld.ltd —— 反代到宿主 mp-server (172.17.0.1:8088)
# 复用现有 *.aworld.ltd 通配证书；鉴权由 mp-server 应用层负责。
server {
    listen 80;
    server_name mp-helper.aworld.ltd;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name mp-helper.aworld.ltd;

    ssl_certificate     /data/www/nginx/cert/aworld.ltd/aworld.ltd.crt;
    ssl_certificate_key /data/www/nginx/cert/aworld.ltd/aworld.ltd.key;
    ssl_session_timeout 5m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # 素材（图片）上传，放宽请求体大小
    client_max_body_size 50m;

    proxy_connect_timeout 30s;
    proxy_read_timeout    120s;
    proxy_send_timeout    120s;

    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # mp-cli 多平台二进制下载（静态，公开，无需鉴权）
    location /download/ {
        alias /usr/share/nginx/html/mp-helper/download/;
        autoindex on;
        default_type application/octet-stream;
        add_header Content-Disposition "attachment";
    }

    location / {
        proxy_pass http://172.17.0.1:8088;
    }

    access_log /data/www/nginx/log/mp-helper.aworld.ltd.log;
}
